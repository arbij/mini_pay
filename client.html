<!doctype html>

<script
	src= './send request.js'
></script>

<script
	type=module
>
	let send_request
	=
	create_request_sender(
		new URLSearchParams(
			location.search
		)
		.get(
			'port'
		)
		??
		5000
	)
	
	function
	create_element(
		tag,
		attributes
	){
		let element
		=
		document
		.createElement(
			tag
		)
		
		for(
			let
			attribute
			in
			attributes
		){
			element[
				attribute
			]
			=
			attributes[
				attribute
			]
		}
		
		return(
			element
		)
	}
	
	let result
	=
	create_element(
		'pre'
	)
	
	async function display(
		response
	){
		response
		=
		await
		response
		
		if(
			typeof
			response
			===
			'object'
		)
		response
		=
		JSON
		.stringify(
			response,
			null,
			4
		)
		
		result
		.innerHTML
		=
		response
	}
	
	function append(
		...
		nodes
	){
		document
		.body
		.append(
			...
			nodes
		)
	}
	
	function br(){
		return create_element(
			'br'
		)
	}
	
	append(
		create_element(
			'button',
			
			{
				innerHTML:
				'get all payment providers',
				
				async onclick(){
					display(
						send_request(
							{
								name: 'get all'
							}
						)
					)
				}
			}
		),
		
		br(),
		br()
	)
	
	let name_of_provider
	=
	create_element(
		'input'
	)
	
	append(
		'Name of payment provider: ',
		
		name_of_provider,
		
		br(),
		
		create_element(
			'button',
			
			{
				innerHTML:
				'get a single payment provider',
				
				async onclick(){
					display(
						send_request(
							{
								name: 'get single',
								
								provider_name: name_of_provider.value
							}
						)
					)
				}
			}
		),
		
		br(),
		
		create_element(
			'button',
			
			{
				innerHTML: 'remove provider',
				
				async onclick(){
					display(
						send_request(
							{
								name:
								'remove',
								
								provider_name:
									name_of_provider
									.value
							}
						)
					)
				}
			}
		),
		
		br(),
		br()
	)
	
	let keys
	=
	[
		'name',
		'currency',
		'url',
		'description',
		'enabled'
	]
	
	let new_inputs = {}
	
	for(
		let key
		of keys
	){
		append(
			key,
			
			': ',
			
			new_inputs[
				key
			]
			=
			create_element(
				'input'
			),
			
			br()
		)
	}
	
	new_inputs
	.enabled
	.type
	=
	'checkbox'
	
	new_inputs
	.enabled
	.checked
	=
	true
	
	append(
		create_element(
			'button',
			
			{
				innerHTML: 'add new provider',
				
				async onclick(){
					let provider = {}
					
					for(
						let key
						in new_inputs
					){
						provider[
							key
						]
						=
						new_inputs[
							key
						]
						.value
					}
					
					provider
					.enabled
					=
					new_inputs
					.enabled
					.checked
					
					display(
						send_request(
							{
								name: 'add',
								
								provider
							}
						)
					)
				}
			}
		),
		
		br(),
		
		create_element(
			'button',
			
			{
				innerHTML: 'update an existing provider (also fill provider name at the top, empty inputs do not get sent)',
				
				async onclick(){
					let provider = {}
					
					for(
						let key
						in new_inputs
					){
						if(
							new_inputs[
								key
							]
							!==
							''
						)
						provider[
							key
						]
						=
						new_inputs[
							key
						]
						.value						
					}
					
					provider
					.enabled
					=
					new_inputs
					.enabled
					.checked
					
					display(
						send_request(
							{
								name:
								'update',
								
								provider_name
								:
								name_of_provider
								.value,
								
								new_data:
								provider
							}
						)
					)
				}
			}
		),
		
		br(),
		br()
	)
	
	let
	amount
	=
	create_element(
		'input',
		{
			type: 'number',
			min: 1,
			value: 1
		}
	)
	
	let description
	=
	create_element(
		'input'
	)
	
	append(
		'amount to be payed (in provider\'s currency): ',
		amount,
		br(),
		
		'payment description',
		description,
		br(),
		
		create_element(
			'button',
			
			{
				innerHTML: 'make a payment (also fill provider name at the top)',
				
				async onclick(){
					display(
						send_request(
							{
								name: 'pay',
								amount: + amount.value,
								description: description.value,
								provider_name: name_of_provider.value
							}
						)
					)
				}
			}
		),
		
		result
	)
</script>
